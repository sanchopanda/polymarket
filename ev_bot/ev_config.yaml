# EV-бот — изолированная конфигурация
# Использует data/backtest_markets.json для EV-анализа

ev_filter:
  cache_path: "data/backtest_markets.json"
  min_samples: 50           # мин. рынков в бакете (чем больше — тем надёжнее)
  recalc_interval: 50       # пересчёт EV каждые N новых резолюций

strategy:
  price_min: 0.05
  price_max: 0.50           # EV-фильтр сам сузит диапазон
  min_volume: 1000.0
  min_liquidity: 1000.0
  max_days_to_expiry: 0.083 # 2 часа
  fee_type: "crypto_fees"   # только Bitcoin/Ethereum Up/Down

martingale:
  initial_bet: 1.0
  max_depth: 6
  taker_fee: 0.02           # 2% Polymarket
  starting_balance: 50.0

db:
  path: "data/ev_bot.db"
