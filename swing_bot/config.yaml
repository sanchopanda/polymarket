strategy:
  interval_minutes: 5             # legacy single interval
  interval_minutes_list: [5, 15]  # active intervals
  min_entry_price: 0.45           # buy side only if ask >= this
  max_entry_price: 0.51           # buy cheaper side if ask <= this
  sell_target: 0.60               # sell entered side when bid >= this
  arb_target: 0.40                # buy opposite side when ask <= this
  max_flip_price: 0.90            # buy opposite side on cutoff only if ask <= this
  cutoff_pct: 0.90                # if no arb, buy opposite side at 90% of market duration
  stake_usd: 1.0                  # paper stake size
  verification_delay_seconds: 1   # orderbook re-check delay

market_filter:
  symbols: ["BTC", "ETH", "SOL", "XRP"]
  fee_type: "crypto_fees"
  min_days_to_expiry: 0
  max_days_to_expiry: 0.01
  min_volume: 0
  min_liquidity: 100

polymarket:
  gamma_base_url: "https://gamma-api.polymarket.com"
  clob_base_url: "https://clob.polymarket.com"
  clob_ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  page_size: 500
  request_delay_ms: 100

runtime:
  scan_interval_seconds: 60

db:
  path: "data/swing_bot.db"

telegram:
  token_env: "FAST_ARB_BOT_TOKEN"
  chat_id_file: "data/.telegram_chat_id"
