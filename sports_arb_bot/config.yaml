trading:
  stake_usd: 60.0
  min_edge: 0.05
  min_leg_price: 0.05
  max_leg_price: 0.95
  scan_interval_seconds: 900   # 15 мин

# Активные спорты. Каждое значение — internal sport label.
# PM: фильтруется через SERIES_SLUG_TO_SPORT (feed_polymarket.py)
# Kalshi: маппится на series_ticker через KALSHI_SERIES_BY_SPORT (watch_runner.py)
#
#   wta  — WTA Challenger (теннис, женщины)       PM: "wta"                    Ka: KXWTACHALLENGERMATCH
#   atp  — ATP Challenger + ATP Tour (теннис)     PM: "atp"                    Ka: KXATPCHALLENGERMATCH, KXATPMATCH
#   r6   — Rainbow Six Siege (esports)            PM: "rainbow-six-siege"      Ka: KXR6GAME
#   ipl  — Indian Premier League (крикет)         PM: "indian-premier-league"  Ka: KXIPLGAME
#   t20  — T20 International Cricket              PM: "international-cricket"  Ka: KXT20MATCH
#   cwbb — NCAA Women's Basketball                PM: "cwbb"                   Ka: KXNCAAWBGAME
#   cbb  — NCAA Men's Basketball                  PM: "ncaa-cbb"               Ka: KXNCAAMBGAME
sports: [wta, atp, r6, ipl, t20, cwbb, cbb]

matching:
  use_llm: false  # TennisMatcher по умолчанию

db:
  path: "data/sports_arb_bot.db"

polymarket:
  clob_host: "https://clob.polymarket.com"

kalshi:
  base_url: "https://api.elections.kalshi.com/trade-api/v2"

runtime:
  status_interval_seconds: 30
  resolve_interval_seconds: 300
