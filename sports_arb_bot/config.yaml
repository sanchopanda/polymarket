trading:
  stake_usd: 20.0
  min_edge: 0.05
  min_leg_price: 0.05
  max_leg_price: 0.95
  high_edge_threshold: 0.15  # edge выше этого — подозрительный; применяем pm_max_leg_price
  pm_max_leg_price: 0.48     # при высоком edge не покупать PM выше 48¢ (защита от N/A резолва)
  scan_interval_seconds: 900   # 15 мин

# Активные спорты. Каждое значение — internal sport label.
# PM: фильтруется через SERIES_SLUG_TO_SPORT (feed_polymarket.py)
# Kalshi: маппится на series_ticker через KALSHI_SERIES_BY_SPORT (watch_runner.py)
#
#   wta  — WTA Challenger (теннис, женщины)       PM: "wta"                    Ka: KXWTACHALLENGERMATCH
#   atp  — ATP Challenger + ATP Tour (теннис)     PM: "atp"                    Ka: KXATPCHALLENGERMATCH, KXATPMATCH
#   r6   — Rainbow Six Siege (esports)            PM: "rainbow-six-siege"      Ka: KXR6GAME
#   ipl  — Indian Premier League (крикет)         PM: "indian-premier-league"  Ka: KXIPLGAME
#   t20  — T20 International Cricket              PM: "international-cricket"  Ka: KXT20MATCH
#   cwbb — NCAA Women's Basketball                PM: "cwbb"                   Ka: KXNCAAWBGAME
#   cbb  — NCAA Men's Basketball                  PM: "ncaa-cbb"               Ka: KXNCAAMBGAME
#   nba  — NBA (матчер: город→прозвище)           PM: "nba-*"                  Ka: KXNBAGAME
sports: [wta, atp, r6, ipl, t20, cwbb, cbb, nba]

matching:
  use_llm: false  # TennisMatcher по умолчанию

db:
  path: "data/sports_arb_bot.db"

polymarket:
  clob_host: "https://clob.polymarket.com"

kalshi:
  base_url: "https://api.elections.kalshi.com/trade-api/v2"

runtime:
  status_interval_seconds: 30
  resolve_interval_seconds: 300

# Реальная торговля. Требует env-переменных:
#   WALLET_PRIVATE_KEY, WALLET_PROXY (опц.)       — Polymarket
#   KALSHI_API_KEY_ID, KALSHI_PRIVATE_KEY_PATH    — Kalshi
#
# Логика переключения paper/real:
#   - Если real_per_pair достиг max_real_per_pair → дальше paper для этой пары
#   - Если суммарные потери ≥ max_loss_usd → paper для всего
#   - Если баланс < min_balance_pm/ka → paper
telegram:
  token_env: SIMPLE_BOT_TOKEN

real_trading:
  enabled: false
  kalshi_slippage_cents: 2      # добавляем к цене Kalshi при выставлении ордера
  pm_price_buffer_cents: 2      # добавляем к цене PM при первой попытке
  min_fill_pct: 80              # минимальный процент заполнения (0–100)
  ka_poll_interval_seconds: 2   # как часто опрашиваем Kalshi resting ордера
  max_real_per_pair: 2          # макс реальных арбитражей на одну пару рынков
  max_positions_per_pair: 4     # макс всего позиций (real + paper) на одну пару рынков
  max_loss_usd: 20.0            # макс суммарные потери по реальным позициям
  min_balance_pm: 10.0          # мин баланс Polymarket для реальной торговли
  min_balance_ka: 10.0          # мин баланс Kalshi для реальной торговли
