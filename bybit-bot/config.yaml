bybit:
  mode: "demo"             # demo | testnet | mainnet
  # api_key и api_secret берутся из .env (BYBIT_API_KEY, BYBIT_API_SECRET)
  symbols:                 # Торговые пары для серий (>=max_active_series штук)
    - "XRPUSDT"
    - "DOGEUSDT"
    - "BNBUSDT"
    - "TRXUSDT"
    - "POLUSDT"
    - "ADAUSDT"
    - "LINKUSDT"
    - "AVAXUSDT"
    - "LTCUSDT"
    - "DOTUSDT"
  leverage: 75             # Плечо (макс для большинства символов)

martingale:
  initial_margin_usdt: 0.10  # Начальная маржа ($)
  take_profit_pct: 0.8       # Тейк-профит % > SL чтобы win > loss с учётом комиссий
  stop_loss_pct: 0.5         # Стоп-лосс %
  max_series_depth: 10       # Макс. глубина
  max_active_series: 10      # Параллельных серий
  check_interval_sec: 10     # Интервал проверки позиций (сек)

db:
  path: "data/bot.db"

reports:
  starting_balance: 50.0    # Начальный баланс ($)
  max_rows: 50
