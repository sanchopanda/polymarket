strategy:
  spike_threshold_cents: 7
  spike_signals_enabled: false  # отключены — gap сигналы работают лучше
  disable_pm_to_kalshi: true    # PM→Kalshi убыточно, отключено
  max_spike_cents: 30
  max_entry_price: 0.90
  min_leader_price: 0.65
  max_leader_price: 0.90
  max_price_gap_cents: 40           # kalshi→pm направление
  max_price_gap_cents_pm_to_kalshi: 15  # pm→kalshi: PM знает исход раньше, большой гэп = ловушка
  gap_signal_min_cents: 5       # статический гэп: минимальный разрыв для входа без спайка
  gap_rising_lookback_seconds: 20  # лидер должен расти за последние N секунд
  spike_window_seconds: 45
  cooldown_seconds: 120
  trades_per_budget: 10     # stake = free_balance / trades_per_budget
  max_open_positions: 10

budget:
  total_usd: 20.0           # начальный виртуальный бюджет
  min_floor_usd: 2.0        # минимальный порог остановки (при нулевой прибыли)
  # порог = max(min_floor_usd, cumulative_pnl)
  # пример: бюджет $30 (pnl=+$10) → порог=$10, останавливаем если баланс <= $10

market_filter:
  symbol: ""
  fee_type: "crypto_fees"
  min_days_to_expiry: 0
  max_days_to_expiry: 0.083
  min_volume: 1000
  min_liquidity: 1000
  expiry_tolerance_seconds: 120

runtime:
  universe_refresh_seconds: 60
  status_interval_seconds: 15

db:
  path: "data/real_momentum_bot.db"

polymarket:
  gamma_base_url: "https://gamma-api.polymarket.com"
  page_size: 500
  request_delay_ms: 100

kalshi:
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  page_size: 200
  max_pages: 10
  request_timeout_seconds: 20
  series_tickers:
    - "KXBTC15M"
    - "KXETH15M"
    - "KXSOL15M"
    - "KXXRP15M"
    - "KXDOGE15M"
    - "KXBNB15M"
