strategy:
  spike_threshold_cents: 7
  spike_signals_enabled: false  # отключены — gap сигналы работают лучше
  disable_pm_to_kalshi: false   # PM→Kalshi включено в тестовом режиме
  max_spike_cents: 30
  max_entry_price: 0.70
  min_leader_price: 0.65
  max_leader_price: 0.93
  max_price_gap_cents: 40           # kalshi→pm направление
  max_price_gap_cents_pm_to_kalshi: 15  # pm→kalshi: PM знает исход раньше, большой гэп = ловушка
  gap_signal_min_cents: 15      # статический гэп: минимальный разрыв для входа без спайка (5c был убыточен)
  gap_rising_lookback_seconds: 45  # лидер не должен падать за последние N секунд
  gap_rising_min_cents: 5          # лидер должен вырасти минимум на N центов за lookback
  spike_window_seconds: 45
  cooldown_seconds: 60
  attempt_cooldown_seconds: 5
  trades_per_budget: 10     # stake = free_balance / trades_per_budget
  pm_to_kalshi_test_stake_usd: 1.0
  reverse_signal_min_cents: 10.0
  reverse_test_stake_usd: 1.0
  max_open_positions: 10

budget:
  total_usd: 50.0
  floor_pct_of_total: 0.40  # floor = 40% от текущего total

market_filter:
  symbol: ""
  fee_type: "crypto_fees"
  min_days_to_expiry: 0
  max_days_to_expiry: 0.083
  min_volume: 1000
  min_liquidity: 1000
  expiry_tolerance_seconds: 120

runtime:
  universe_refresh_seconds: 60
  status_interval_seconds: 15

db:
  path: "data/real_momentum_bot.db"

polymarket:
  gamma_base_url: "https://gamma-api.polymarket.com"
  page_size: 500
  request_delay_ms: 100

kalshi:
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  page_size: 200
  max_pages: 10
  request_timeout_seconds: 20
  series_tickers:
    - "KXBTC15M"
    - "KXETH15M"
    - "KXXRP15M"
    - "KXDOGE15M"
    - "KXBNB15M"
