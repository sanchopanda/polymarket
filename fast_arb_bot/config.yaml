trading:
  stake_per_pair_usd: 20.0
  min_lock_edge: 0.06
  completion_min_edge: 0.05
  completion_skip_pm_if_price_above: 0.60
  completion_cancel_kalshi_rise: 0.10     # отменить рестинг Kalshi если live_ask - pm_fill >= этого
  completion_reenter_kalshi_rise: 0.08    # перевыставить когда live_ask - pm_fill <= этого (один раз, финально)
  max_lock_edge: 0.45
  stake_tier_half_above: 0.20
  stake_tier_third_above: 0.30
  max_open_pairs: 5
  max_entries_per_pair: 1

safety:
  max_trade_size_usd: 25.0
  min_total_balance_usd: 100.0
  min_leg_price: 0.10
  max_leg_price: 0.90
  blocked_leg_price_min: 0.0
  blocked_leg_price_max: 0.0
  min_balance_polymarket: 30.0
  min_balance_kalshi: 30.0
  cooldown_seconds: 10.0
  require_confirmation: false
  dry_run: true
  balance_divergence_threshold: 5.0
  min_partial_fill_pct: 50
  kalshi_slippage_cents: 0
  polymarket_price_buffer_cents: 0
  max_oracle_gap_pct: 0.02

fast_arb:
  budget_usd: 60.0           # базовый бюджет (растёт с выигрышами)
  max_realized_loss_usd: 201.0  # максимальные реализованные потери — стоп
  order_book_min_liquidity_ratio: 2.0
  scan_interval_seconds: 180

market_filter:
  symbol: ""
  fee_type: "crypto_fees"
  min_days_to_expiry: 0
  max_days_to_expiry: 0.083
  min_volume: 0
  min_liquidity: 1000
  expiry_tolerance_seconds: 120
  slug_symbols:
    - "btc"
    - "eth"
    - "sol"
    - "xrp"
    - "doge"
    - "bnb"

runtime:
  poll_interval_seconds: 60
  recheck_delay_seconds: 1.0
  watch_universe_refresh_seconds: 60

execution:
  first_leg: "parallel"

db:
  path: "data/fast_arb_bot.db"

polymarket:
  gamma_base_url: "https://gamma-api.polymarket.com"
  clob_host: "https://clob.polymarket.com"
  chain_id: 137
  page_size: 500
  request_delay_ms: 100

kalshi:
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  page_size: 200
  max_pages: 10
  request_timeout_seconds: 20
  series_tickers:
    - "KXBTC15M"
    - "KXETH15M"
    - "KXSOL15M"
    - "KXDOGE15M"
    - "KXBNB15M"
    - "KXXRP15M"

chainlink:
  rpc_urls:
    - "https://polygon-bor-rpc.publicnode.com"
    - "https://polygon.drpc.org"
    - "https://rpc-mainnet.matic.quiknode.pro"
    - "https://1rpc.io/matic"
  wss_urls:
    - "wss://polygon-bor-rpc.publicnode.com"
    - "wss://polygon.drpc.org"
  poll_interval_seconds: 10
  danger_zone_pct: 0.05          # exit if price within 0.05% of reference
  pre_expiry_check_seconds: 120  # start checking 2 min before expiry

telegram:
  token_env: FAST_ARB_BOT_TOKEN
