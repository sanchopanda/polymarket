  bet_size: 1.0            # Размер ставки ($)
  taker_fee: 0.02          # Комиссия Polymarket 2%

db:
  path: "data/simple_bot.db"

telegram:
  token: ""                # Задай через env SIMPLE_BOT_TOKEN
