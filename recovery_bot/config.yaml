strategy:
  paper_enabled: false
  real_enabled: true
  paper_stake_usd: 5.0
  real_stake_usd: 1.0          # минимальная ставка (floor) и фикс-ставка для символов без скейла
  stake_scale_n: 30            # ставка = balance / N (применяется только к stake_scale_symbols)
  stake_scale_symbols: ["BTC"]  # ставка = balance / stake_scale_n
  initial_real_deposit_usd: 15.0
  real_order_wait_seconds: 0.5
  real_order_cancel_after_seconds: 15  # если ордер не заполнился через N секунд после постановки — отменяем
  real_order_cancel_if_ask_below: 0.60 # price-floor: отмена working-ордера если best_ask упал ниже порога
  cancel_before_expiry_seconds: 15
  paper_fill_max_slippage: 0.02
  signal_source: "trade"     # источник сигнала: best_ask | trade
  five_minute:
    bottom_price: 0.38
    entry_price: 0.65
    top_price: 0.68
    activation_delay_seconds: 0
    max_seconds_to_expiry: 240   # не арм-им сигналы если до экспирации >240с
  fifteen_minute:
    bottom_price: 0.38
    entry_price: 0.65
    top_price: 0.68
    activation_delay_seconds: 30
    max_seconds_to_expiry: 240

  real_disabled_intervals: [15]   # временно отключён 15m в real (убыточен при entry=0.65/top=0.68)
  real_confirm_delay_seconds: 1.0   # пауза после armed перед выставлением real-ордера
  real_confirm_delay_seconds_by_symbol:  # per-symbol: альтам 2s (цена за 2с «отфильтровывается», ask>0.68 только у 0-5% fills)
    BTC: 0.2
    SOL: 2.0
    DOGE: 2.0
    BNB: 2.0
    XRP: 2.0
  real_confirm_min_price: 0.63      # если после delay best_ask < этого — считаем fake signal, скип
  real_confirm_min_price_by_symbol: # per-symbol override (в зоне [0.63,0.65] у DOGE/BNB WR=25-47%, у SOL WR=73% — не режем)
    BTC: 0.60   # ask@0.2s: 0.60-0.62 WR=66.7% (+$2.54/21), 0.55-0.59 WR=44.4% (-$9.55/9) — режем <0.60
    DOGE: 0.65
    BNB: 0.65
    XRP: 0.66   # ask@2s bucket [0.65,0.66) WR=37% $-3.38, [0.66,0.67) WR=75% $+1.96 — граница на 0.66
  real_hold_test_by_symbol: {}       # XRP: точечная fake_drop @2s min=0.66 (заменил hold_test — он резал выигрышные)
  min_seconds_to_expiry_by_symbol:  # per-symbol минимум времени до экспирации (ETH: rem<120s WR=47% $-4.29)
    ETH: 120
    BTC: 20   # 2026-04-20: бот зашёл NO за 5с до экспирации на позднем флаше — ставим нижний порог
  skip_seconds_to_expiry_zones_by_symbol: {}  # [lo, hi) зоны со слабым WR — пока не активно, мало данных
  # ran_away фильтр убран 2026-04-19: симуляция показала что лимит 0.68 сам отсеивает
  # «улетевшие» сделки (ордер просто висит и либо дождётся возврата, либо отменится
  # через real_order_cancel_after_seconds). Подъём порога давал фантомный edge.

  symbol_drawdown_threshold_usd: 6.0   # default авто-отключение символа при просадке от baseline
  symbol_drawdown_threshold_usd_by_symbol: # per-symbol override (BTC — единственный со скейлом ставки, допускаем более глубокую просадку)
    BTC: 50.0

  repeat_bet:
    enabled: false
    touch_max: 0.39        # touch_price < этого порога (bottom_price=0.38 включительно)
    gap_min_seconds: 10    # минимальный gap между оригинальным и повторным armed
    top_price: 0.70        # лимит repeat-ставки (выше чем основной 0.68, без delay-проверки)
    top_price_final: 0.80          # лимит для последних top_price_final_window секунд рынка
    top_price_final_window: 20     # если до экспирации ≤ N секунд — используем top_price_final

  real_stats_exclude:
    - "real_v2"

market_filter:
  symbols: ["BTC", "ETH"]
  interval_minutes: [5, 15]
  fee_type: "crypto_fees"
  min_days_to_expiry: 0
  max_days_to_expiry: 0.02
  min_volume: 0
  min_liquidity: 0

runtime:
  universe_refresh_seconds: 60
  status_interval_seconds: 15

db:
  path: "data/recovery_bot.db"

polymarket:
  paper: true
  real: false
  gamma_base_url: "https://gamma-api.polymarket.com"
  clob_base_url: "https://clob.polymarket.com"
  clob_ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  page_size: 500
  request_delay_ms: 100

kalshi:
  paper: false
  real: false

telegram:
  token_env: "TELEGRAM_TOKEN"
  chat_id_file: "data/.telegram_chat_id"
