price_source: "binance"  # "chainlink" | "binance"

runtime:
  scan_interval_seconds: 300   # граница сканирования: 300 = каждые 5 мин (:00, :05, :10, ...)

trading:
  stake_usd: 5.0          # paper bet size
  max_price: 0.70         # максимальная цена входа для paper (максимальная из конфигов)

paper_configs:
  - name: "A"
    delta_pct: 0.05
    max_ask: 0.50
    venue: "polymarket"
  - name: "V1"
    delta_pct: 0.05
    max_ask: 0.50
    venue: "polymarket"
    min_secs_from_start: { "5": 90, "15": 0 }
    max_secs_from_start: 180
  - name: "M2"
    delta_pct: 0.02
    max_ask: 0.50
    venue: "polymarket"
    require_binance_move: true
  - name: "M3"
    delta_pct: 0.03
    max_ask: 0.50
    venue: "polymarket"
    require_binance_move: true
  - name: "M4"
    delta_pct: 0.04
    max_ask: 0.50
    venue: "polymarket"
    require_binance_move: true
  - name: "M5"
    delta_pct: 0.05
    max_ask: 0.50
    venue: "polymarket"
    require_binance_move: true

real_trading:
  enabled: true
  stake_usd: 1.0
  initial_deposit: 10.0
  floor_pct: 0.50
  max_price: 0.49
  min_secs_from_start: { "5": 90, "15": 0 }
  max_secs_from_start: 180

market_filter:
  interval_minutes: [5, 15]
  symbols: ["BTC", "ETH", "SOL", "XRP", "DOGE", "BNB"]
  min_days_to_expiry: 0
  max_days_to_expiry: 0.1
  min_volume: 0
  min_liquidity: 100
  fee_type: "crypto_fees"

strategy:
  mode: "crossing"           # "crossing" | "cl_contradiction" | "binance_momentum"
  delta_threshold_pct: 0.02  # Binance > 0.02% от страйка → сигнал
  max_entry_price: 0.60      # покупаем только если PM ask < $0.60
  min_orderbook_usd: 10.0    # минимальная ликвидность в стакане для входа (2x stake)
  depth_slippage_cents: 4.0  # смотрим стакан до best_ask + 4c
  active_zone_min: 0.01
  active_zone_max: 0.50
  min_cl_delta_pct: 0.03
  # momentum params (не используются в crossing, оставлены для переключения)
  momentum_delta_pct: 0.05
  momentum_min_minute: 1
  momentum_adaptive: true
  momentum_adaptive_window: 600
  momentum_adaptive_rules: [[2, 0.05], [5, 0.08], [999, 0.12]]
  momentum_cheap_delta_pct: 0.0
  momentum_continuous: true

chainlink:
  rpc_urls:
    - "https://polygon-bor-rpc.publicnode.com"
    - "https://polygon.drpc.org"
    - "https://polygon.meowrpc.com"
  wss_urls:
    - "wss://polygon-bor-rpc.publicnode.com"
    - "wss://polygon.drpc.org"
    - "wss://1rpc.io/matic"
  poll_interval_seconds: 30   # fallback only; WS handles real-time

binance:
  symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT", "DOGEUSDT", "BNBUSDT"]

polymarket:
  paper: true               # бумажные ставки на Polymarket
  real: true                # реальные ставки на Polymarket
  gamma_base_url: "https://gamma-api.polymarket.com"
  clob_base_url: "https://clob.polymarket.com"
  clob_ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  page_size: 500
  request_delay_ms: 100

kalshi:
  paper: false              # бумажные ставки на Kalshi
  real: false               # реальные ставки на Kalshi (не реализовано)
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  page_size: 200
  max_pages: 10
  request_timeout_seconds: 20
  series_tickers:
    - "KXBTC15M"
    - "KXETH15M"
    - "KXSOL15M"
    - "KXXRP15M"
    - "KXDOGE15M"
    - "KXBNB15M"

db:
  path: "data/oracle_arb_bot.db"

telegram:
  enabled: true
