price_source: "binance"  # "chainlink" | "binance"

runtime:
  scan_interval_seconds: 300   # граница сканирования: 300 = каждые 5 мин (:00, :05, :10, ...)

trading:
  stake_usd: 5.0          # paper bet size
  max_price: 0.48         # максимальная цена входа для paper (после округления вверх)

real_trading:
  enabled: false             # реальные ставки выключены
  stake_usd: 1.0           # $1 за ставку
  initial_deposit: 6.0     # начальный депозит = минимальная дельта
  floor_pct: 0.20          # дельта = 20% от пика (но не меньше initial_deposit)
  max_price: 0.49          # максимальная цена входа для реала

market_filter:
  interval_minutes: [5, 15]
  symbols: ["BTC", "ETH", "SOL", "XRP"]
  min_days_to_expiry: 0
  max_days_to_expiry: 0.1
  min_volume: 0
  min_liquidity: 100
  fee_type: "crypto_fees"

strategy:
  mode: "binance_momentum"   # "crossing" | "cl_contradiction" | "binance_momentum"
  momentum_delta_pct: 0.05   # базовый минимальный скачок Binance за 5 секунд
  momentum_min_minute: 1     # не ставить на первой минуте рынка
  momentum_adaptive: true    # адаптивный порог по числу сигналов за последние 10 мин
  momentum_adaptive_window: 600  # окно подсчёта сигналов (секунды)
  # правила: [макс_кол-во_сигналов, порог_дельты] — первое совпадение
  momentum_adaptive_rules: [[2, 0.05], [5, 0.08], [999, 0.12]]
  momentum_cheap_delta_pct: 0.10  # мин. дельта для ставок с ценой < 0.50
  min_orderbook_usd: 5.0     # минимальная ликвидность в стакане для входа
  depth_slippage_cents: 4.0  # смотрим стакан до best_ask + 4c
  # параметры для других стратегий (не используются в momentum)
  delta_threshold_pct: 0.05
  max_entry_price: 0.48
  active_zone_min: 0.20
  active_zone_max: 0.70
  min_cl_delta_pct: 0.03

chainlink:
  rpc_urls:
    - "https://polygon-bor-rpc.publicnode.com"
    - "https://polygon.drpc.org"
    - "https://polygon.meowrpc.com"
  wss_urls:
    - "wss://polygon-bor-rpc.publicnode.com"
    - "wss://polygon.drpc.org"
    - "wss://1rpc.io/matic"
  poll_interval_seconds: 30   # fallback only; WS handles real-time

binance:
  symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT"]

polymarket:
  paper: true               # бумажные ставки на Polymarket
  real: true                # реальные ставки на Polymarket
  gamma_base_url: "https://gamma-api.polymarket.com"
  clob_base_url: "https://clob.polymarket.com"
  clob_ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  page_size: 500
  request_delay_ms: 100

kalshi:
  paper: false              # бумажные ставки на Kalshi (выключено)
  real: false               # реальные ставки на Kalshi (не реализовано)
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  page_size: 200
  max_pages: 10
  request_timeout_seconds: 20
  series_tickers:
    - "KXBTC15M"
    - "KXETH15M"
    - "KXSOL15M"
    - "KXXRP15M"

db:
  path: "data/oracle_arb_bot.db"

telegram:
  enabled: true
